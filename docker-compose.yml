services:
  bun:
    build: .
    command: bun /app/server/server.ts
    env_file:
      - path: ./.env
        required: false
    ports:
      - "${APP_PORT:-9595}:9595"
    volumes:
      - ${UPLOADS_DIR:-/tmp/shooting-stars-uploads}:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://0.0.0.0:9595 || exit 1"]
      interval: 5s
      timeout: 5s

  bun-dev:
    build:
      context: .
      target: dev
    env_file:
      - path: ./.env
        required: false
    ports:
      - "${APP_PORT:-9595}:9595"
    volumes:
      - ${UPLOADS_DIR:-/tmp/shooting-stars-uploads}:/app/uploads
      - ./server:/app/server
      - ./client:/app/client
      - ./tsconfig.json:/app/tsconfig.json
      - ./biome.json:/app/biome.json
      - ./.gitignore:/app/.gitignore
      - ./tests:/app/tests
    profiles:
      - dev

  cleanup:
    build: ./scripts
    env_file:
      - path: ./.env
        required: false
    volumes:
      - ${UPLOADS_DIR:-/tmp/shooting-stars-uploads}:/uploads
    restart: unless-stopped
