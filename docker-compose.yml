services:
  bun:
    build: .
    command: bun /app/server.js
    env_file:
      - path: ./.env
        required: false
    ports:
      - "9595:9595"
    volumes:
      - /opt/tekrop/shooting-stars/uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://0.0.0.0:9595 || exit 1"]
      interval: 5s
      timeout: 5s

  bun-dev:
    build:
      context: .
      target: dev
    env_file:
      - path: ./.env
        required: false
    ports:
      - "9595:9595"
    volumes:
      - /opt/tekrop/shooting-stars/uploads:/app/uploads
      - ./server.js:/app/server.js
      - ./index.html:/app/index.html
      - ./src:/app/src
      - ./public:/app/public
    profiles:
      - dev
