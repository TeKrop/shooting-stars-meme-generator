<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="Turn any image into a shooting star flying across the sky, meme-style. Upload a picture and watch it soar.">
        <title>Shooting Stars Meme Generator</title>
        <link rel="stylesheet" href="./style.css">
        <link rel="shortcut icon" type="image/png" href="/img/favicon.png"/>

        <meta property="og:type" content="website">
        <meta property="og:title" content="Shooting Stars Meme Generator">
        <meta property="og:description" content="Turn any image into a shooting star flying across the sky, meme-style. Upload a picture and watch it soar.">
        <meta property="og:image" content="https://shooting-stars.tekrop.fr/img/preview.jpg">
        <meta property="og:url" content="https://shooting-stars.tekrop.fr">
    </head>
    <body>
        <video id="video" preload="auto">
            <source src="./public/videos/background.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="uploader">
            <div class="uploader-card">
                <p class="tagline">✦ Make it fly ✦</p>
                <form id="upload-form" enctype="multipart/form-data" action="/upload" method="post">
                    <input type="file" id="file-upload" name="file-upload" accept="image/*" />
                    <label for="file-upload">📷 Upload pic</label>
                </form>
            </div>
        </div>
        <div id="tap-to-play">
            <p>▶ Click to launch</p>
        </div>
        <dialog id="preview-dialog">
            <div class="preview-card">
                <div id="crop-step">
                    <p class="tagline">✦ Step 1: Crop ✦</p>
                    <div id="crop-area">
                        <img id="preview-img" alt="Preview">
                    </div>
                    <p class="crop-hint">Adjust the selection to crop, or continue as-is</p>
                </div>

                <div id="edit-step" hidden>
                    <p class="tagline">✦ Step 2: Transparency ✦</p>
                    <canvas id="edit-canvas"></canvas>
                    <div class="tool-picker">
                        <button id="tool-erase" type="button" aria-pressed="true">🧽 Erase</button>
                        <button id="tool-pick" type="button" aria-pressed="false">🎯 Pick color</button>
                        <button id="edit-undo" type="button" disabled>↺ Undo</button>
                        <button id="edit-redo" type="button" disabled>↻ Redo</button>
                    </div>
                    <div class="slider-control" id="erase-size-control">
                        <label for="erase-size">Brush size</label>
                        <input id="erase-size" type="range" min="5" max="60" value="20">
                    </div>
                    <div class="slider-control" id="pick-tolerance-control" hidden>
                        <label for="pick-tolerance">Tolerance</label>
                        <input id="pick-tolerance" type="range" min="0" max="100" value="25">
                    </div>
                    <p class="crop-hint">Make parts of the image transparent (optional)</p>
                </div>

                <div class="preview-actions">
                    <button id="preview-cancel" type="button">✕ Cancel</button>
                    <button id="edit-back" type="button" hidden>⬅ Back</button>
                    <button id="crop-next" type="button">Next ➔</button>
                    <button id="preview-confirm" type="button" hidden>✦ Upload ✦</button>
                </div>
            </div>
        </dialog>
        <div id="pictures-container"></div>
        <footer>
            <p>Code by <b><a href="https://tekrop.fr" target="_blank">Valentin "TeKrop" PORCHET</a></b> - <a href="https://github.com/TeKrop/shooting-stars-meme-generator/blob/main/CGU.md" target="_blank">Terms and conditions of use</a> (in french)</p>
        </footer>
        <script type="module" src="./script.ts"></script>
    </body>
</html>
